<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CINTER | Handcrafted Furniture South Africa</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --walnut:  #3B2314;
      --ivory:   #F5EFE6;
      --gold:    #C9A84C;
      --charcoal:#1C1C1C;
      --olive:   #6B6B4A;
      --cream:   #EDE5D8;
      --white:   #FDFBF8;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--charcoal);
      overflow-x: hidden;
    }
    h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 5%;
      transition: background 0.4s, box-shadow 0.4s;
    }
    nav.scrolled {
      background: rgba(28,20,12,0.96);
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; font-weight: 900;
      color: var(--gold); letter-spacing: 0.15em;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: var(--ivory); text-decoration: none;
      font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;
      font-weight: 500; position: relative; padding-bottom: 2px;
      transition: color 0.3s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 1px; background: var(--gold);
      transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta {
      background: var(--gold); color: var(--walnut) !important;
      padding: 0.5rem 1.4rem; border-radius: 2px;
      font-weight: 600 !important;
    }
    .nav-cta:hover { background: #e0bc5a; }
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; background: none; border: none; padding: 4px;
    }
    .hamburger span {
      display: block; width: 26px; height: 2px;
      background: var(--ivory); transition: 0.3s;
    }
    .mobile-menu {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100vh; background: rgba(28,20,12,0.98);
      z-index: 999; flex-direction: column;
      align-items: center; justify-content: center; gap: 2.5rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; color: var(--ivory); text-decoration: none;
      transition: color 0.3s;
    }
    .mobile-menu a:hover { color: var(--gold); }
    .mobile-close {
      position: absolute; top: 1.5rem; right: 5%;
      background: none; border: none; color: var(--ivory);
      font-size: 2rem; cursor: pointer;
    }

    /* ── HERO ── */
    #home {
      height: 100vh; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(to bottom, rgba(28,12,4,0.65) 0%, rgba(28,12,4,0.4) 60%, rgba(28,12,4,0.8) 100%),
        url('https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=1800&q=80') center/cover no-repeat;
      will-change: transform;
    }
    .wood-overlay {
      position: absolute; inset: 0;
      background: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
      opacity: 0.06; mix-blend-mode: overlay;
    }
    .hero-content {
      position: relative; z-index: 2;
      text-align: center; padding: 0 1rem;
      max-width: 900px;
    }
    .hero-eyebrow {
      font-size: 0.75rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 1.5rem; font-weight: 600;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.8s 0.3s forwards;
    }
    .hero-title {
      font-size: clamp(3rem, 8vw, 6.5rem);
      color: var(--ivory); line-height: 1.05;
      font-weight: 900; font-style: italic;
      opacity: 0; transform: translateY(30px);
      animation: fadeUp 0.9s 0.6s forwards;
    }
    .hero-title span { color: var(--gold); font-style: normal; }
    .hero-sub {
      margin-top: 1.5rem; font-size: 1.1rem;
      color: rgba(245,239,230,0.8); font-weight: 300;
      max-width: 550px; margin-left: auto; margin-right: auto;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.9s 0.9s forwards;
    }
    .hero-btns {
      margin-top: 2.5rem; display: flex; gap: 1rem;
      justify-content: center; flex-wrap: wrap;
      opacity: 0; animation: fadeUp 0.9s 1.2s forwards;
    }
    .btn-primary {
      background: var(--gold); color: var(--walnut);
      padding: 0.9rem 2.2rem; text-decoration: none;
      font-weight: 700; font-size: 0.85rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      border-radius: 2px; transition: all 0.3s;
      display: inline-block;
    }
    .btn-primary:hover { background: #e0bc5a; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,168,76,0.4); }
    .btn-ghost {
      border: 1.5px solid rgba(245,239,230,0.6); color: var(--ivory);
      padding: 0.9rem 2.2rem; text-decoration: none;
      font-weight: 500; font-size: 0.85rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      border-radius: 2px; transition: all 0.3s;
      display: inline-block;
    }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
    .scroll-indicator {
      position: absolute; bottom: 2rem; left: 50%;
      transform: translateX(-50%); z-index: 2;
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
      opacity: 0; animation: fadeIn 1s 2s forwards;
    }
    .scroll-indicator span {
      font-size: 0.65rem; letter-spacing: 0.2em; color: rgba(245,239,230,0.5);
      text-transform: uppercase;
    }
    .scroll-line {
      width: 1px; height: 50px; background: var(--gold);
      animation: scrollPulse 1.5s infinite;
    }
    @keyframes scrollPulse {
      0% { transform: scaleY(0); transform-origin: top; }
      50% { transform: scaleY(1); transform-origin: top; }
      100% { transform: scaleY(0); transform-origin: bottom; }
    }

    /* ── STATS STRIP ── */
    .stats-strip {
      background: var(--walnut);
      display: flex; justify-content: center; flex-wrap: wrap;
      gap: 0;
    }
    .stat {
      padding: 1.8rem 3rem; text-align: center;
      border-right: 1px solid rgba(201,168,76,0.2);
      flex: 1; min-width: 150px;
    }
    .stat:last-child { border-right: none; }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem; color: var(--gold); font-weight: 700;
    }
    .stat-label {
      font-size: 0.72rem; color: rgba(245,239,230,0.6);
      letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.2rem;
    }

    /* ── SECTION SHARED ── */
    section { padding: 6rem 5%; }
    .section-eyebrow {
      font-size: 0.72rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--gold);
      font-weight: 600; margin-bottom: 0.8rem;
    }
    .section-title {
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--walnut); line-height: 1.2;
    }
    .section-title em { color: var(--gold); font-style: italic; }
    .divider {
      width: 50px; height: 2px; background: var(--gold);
      margin: 1.5rem 0;
    }

    /* ── STORY / ABOUT SECTION ── */
    #about { background: var(--ivory); }
    .about-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 5rem; align-items: center; max-width: 1200px; margin: 0 auto;
    }
    .about-image-wrap { position: relative; }
    .about-img {
      width: 100%; height: 550px; object-fit: cover;
      border-radius: 2px;
      box-shadow: 20px 20px 0 var(--gold);
    }
    .about-badge {
      position: absolute; bottom: -2rem; left: -2rem;
      background: var(--walnut); color: var(--gold);
      padding: 1.5rem; text-align: center;
      font-family: 'Playfair Display', serif;
    }
    .about-badge strong { display: block; font-size: 2rem; }
    .about-badge span { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ivory); }
    .about-text { padding-left: 2rem; }
    .about-text p {
      font-size: 1rem; line-height: 1.9; color: #4a3a2a;
      margin-bottom: 1.2rem;
    }
    .about-values {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1rem; margin-top: 2rem;
    }
    .value-item {
      display: flex; gap: 0.8rem; align-items: flex-start;
    }
    .value-icon {
      width: 36px; height: 36px; background: var(--gold);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; font-size: 1rem;
    }
    .value-item h4 { font-size: 0.85rem; color: var(--walnut); margin-bottom: 0.2rem; }
    .value-item p { font-size: 0.78rem; color: #6b5b4a; margin: 0; }

    /* ── PARALLAX BANNER ── */
    .parallax-banner {
      height: 450px; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .parallax-bg {
      position: absolute; inset: -100px 0;
      background:
        linear-gradient(rgba(28,12,4,0.7), rgba(28,12,4,0.7)),
        url('https://images.unsplash.com/photo-1505691938895-1758d7feb511?w=1800&q=80') center/cover no-repeat;
      will-change: transform;
    }
    .parallax-content {
      position: relative; z-index: 2;
      text-align: center; padding: 0 1rem;
    }
    .parallax-content h2 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      color: var(--ivory); font-style: italic;
    }
    .parallax-content h2 span { color: var(--gold); }
    .parallax-content p {
      color: rgba(245,239,230,0.75); margin-top: 1rem;
      font-size: 1rem; max-width: 500px; margin-left: auto; margin-right: auto;
    }

    /* ── PRODUCTS ── */
    #products { background: var(--white); }
    .products-header { max-width: 1200px; margin: 0 auto 3rem; }
    .category-tabs {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      margin-top: 2rem;
    }
    .tab-btn {
      padding: 0.5rem 1.2rem; border: 1.5px solid var(--cream);
      background: transparent; color: #6b5b4a;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer; border-radius: 2px;
      transition: all 0.25s;
    }
    .tab-btn.active, .tab-btn:hover {
      background: var(--walnut); color: var(--gold);
      border-color: var(--walnut);
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.8rem; max-width: 1200px; margin: 0 auto;
    }
    .product-card {
      background: var(--white); border: 1px solid var(--cream);
      transition: all 0.35s; cursor: pointer; border-radius: 2px;
      overflow: hidden;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(59,35,20,0.15);
      border-color: var(--gold);
    }
    .product-img {
      width: 100%; height: 220px; object-fit: cover;
      transition: transform 0.5s;
    }
    .product-card:hover .product-img { transform: scale(1.04); }
    .product-body { padding: 1.3rem; }
    .product-category {
      font-size: 0.65rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--olive);
      font-weight: 600; margin-bottom: 0.4rem;
    }
    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem; color: var(--walnut);
      margin-bottom: 0.5rem;
    }
    .product-desc {
      font-size: 0.8rem; color: #7a6a5a; line-height: 1.6;
      margin-bottom: 1rem;
    }
    .product-footer {
      display: flex; align-items: center;
      justify-content: space-between; padding-top: 0.8rem;
      border-top: 1px solid var(--cream);
    }
    .product-price {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; color: var(--walnut); font-weight: 700;
    }
    .product-price small {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem; color: #9a8a7a; font-weight: 400;
    }
    .btn-add {
      background: var(--walnut); color: var(--gold);
      border: none; padding: 0.5rem 1rem;
      font-size: 0.75rem; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer;
      border-radius: 2px; font-family: 'Inter', sans-serif;
      font-weight: 600; transition: all 0.25s;
    }
    .btn-add:hover { background: var(--gold); color: var(--walnut); }
    .hidden { display: none !important; }

    /* ── GALLERY ── */
    #gallery { background: var(--ivory); }
    .gallery-header { max-width: 1200px; margin: 0 auto 3rem; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 220px);
      gap: 1rem; max-width: 1200px; margin: 0 auto;
    }
    .gallery-item {
      overflow: hidden; position: relative;
      cursor: pointer; border-radius: 2px;
    }
    .gallery-item:first-child {
      grid-column: span 2; grid-row: span 2;
    }
    .gallery-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.5s;
    }
    .gallery-item:hover img { transform: scale(1.08); }
    .gallery-overlay {
      position: absolute; inset: 0;
      background: rgba(59,35,20,0.0);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.35s;
    }
    .gallery-item:hover .gallery-overlay { background: rgba(59,35,20,0.5); }
    .gallery-zoom {
      color: var(--gold); font-size: 2rem;
      opacity: 0; transform: scale(0.7);
      transition: all 0.35s;
    }
    .gallery-item:hover .gallery-zoom { opacity: 1; transform: scale(1); }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92); z-index: 9999;
      align-items: center; justify-content: center;
      flex-direction: column;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw; max-height: 80vh;
      object-fit: contain; border-radius: 2px;
    }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 2rem;
      background: none; border: none; color: var(--ivory);
      font-size: 2.5rem; cursor: pointer;
    }

    /* ── PROCESS SECTION ── */
    .process-section { background: var(--walnut); padding: 5rem 5%; }
    .process-inner { max-width: 1200px; margin: 0 auto; }
    .process-section .section-title { color: var(--ivory); }
    .process-section .section-eyebrow { color: var(--gold); }
    .process-section .divider { background: var(--gold); }
    .process-steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem; margin-top: 3rem;
    }
    .step {
      text-align: center; padding: 2rem 1rem;
      border: 1px solid rgba(201,168,76,0.2);
      transition: border-color 0.3s, transform 0.3s;
    }
    .step:hover { border-color: var(--gold); transform: translateY(-4px); }
    .step-num {
      font-family: 'Playfair Display', serif;
      font-size: 3rem; color: rgba(201,168,76,0.2);
      line-height: 1; margin-bottom: 0.5rem;
    }
    .step-icon { font-size: 2rem; margin-bottom: 1rem; }
    .step h3 {
      color: var(--ivory); font-size: 1rem;
      margin-bottom: 0.6rem; font-family: 'Playfair Display', serif;
    }
    .step p { color: rgba(245,239,230,0.6); font-size: 0.8rem; line-height: 1.7; }

    /* ── TESTIMONIALS ── */
    #testimonials { background: var(--cream); padding: 6rem 5%; }
    .testimonials-inner { max-width: 900px; margin: 0 auto; text-align: center; }
    .testimonials-inner .section-title { color: var(--walnut); }
    .testimonials-inner .divider { margin: 1.5rem auto; }
    .testimonial-slider { margin-top: 3rem; position: relative; overflow: hidden; }
    .testimonial-slide { display: none; }
    .testimonial-slide.active { display: block; }
    .testimonial-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; font-style: italic;
      color: var(--walnut); line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .testimonial-author {
      font-size: 0.8rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--olive);
      font-weight: 600;
    }
    .testimonial-dots {
      display: flex; gap: 0.5rem; justify-content: center;
      margin-top: 2rem;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(59,35,20,0.2); border: none;
      cursor: pointer; transition: background 0.3s;
    }
    .dot.active { background: var(--gold); }

    /* ── CONTACT ── */
    #contact { background: var(--white); }
    .contact-grid {
      display: grid; grid-template-columns: 1fr 1.2fr;
      gap: 5rem; max-width: 1200px; margin: 0 auto;
      align-items: start;
    }
    .contact-info h2 { color: var(--walnut); margin-bottom: 1rem; }
    .contact-info p { color: #6b5b4a; line-height: 1.8; margin-bottom: 2rem; }
    .contact-detail {
      display: flex; gap: 1rem; align-items: center;
      margin-bottom: 1.2rem;
    }
    .contact-icon {
      width: 44px; height: 44px; background: var(--ivory);
      border: 1px solid var(--cream);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 1.1rem; flex-shrink: 0;
    }
    .contact-detail p { margin: 0; font-size: 0.9rem; color: #4a3a2a; }
    .contact-detail small { color: #9a8a7a; font-size: 0.75rem; }
    .contact-form { background: var(--ivory); padding: 2.5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block; font-size: 0.75rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--olive); margin-bottom: 0.5rem; font-weight: 600;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.85rem 1rem;
      border: 1.5px solid var(--cream);
      background: var(--white); font-family: 'Inter', sans-serif;
      font-size: 0.9rem; color: var(--charcoal);
      border-radius: 2px; transition: border-color 0.25s;
      outline: none; resize: vertical;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--gold);
    }
    .form-submit {
      width: 100%; padding: 1rem;
      background: var(--walnut); color: var(--gold);
      border: none; font-family: 'Inter', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.15em;
      text-transform: uppercase; font-weight: 700;
      cursor: pointer; border-radius: 2px;
      transition: all 0.3s;
    }
    .form-submit:hover { background: var(--gold); color: var(--walnut); }
    .form-success {
      display: none; text-align: center;
      padding: 2rem; color: var(--walnut);
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--charcoal); color: rgba(245,239,230,0.7);
      padding: 4rem 5% 2rem;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 3rem; max-width: 1200px; margin: 0 auto;
    }
    .footer-brand .nav-logo { display: inline-block; margin-bottom: 1rem; }
    .footer-brand p { font-size: 0.85rem; line-height: 1.8; max-width: 260px; }
    .footer-col h4 {
      color: var(--gold); font-fa
